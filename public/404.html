<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#070a12" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Page not found | Paul Tey</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #070a12;
        color: #f4f7ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: clamp(1.25rem, 5vw, 4rem);
        background:
          linear-gradient(rgba(46, 229, 255, 0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(46, 229, 255, 0.06) 1px, transparent 1px),
          radial-gradient(circle at 20% 20%, rgba(130, 87, 255, 0.2), transparent 32rem),
          #070a12;
        background-size: 3rem 3rem, 3rem 3rem, auto, auto;
      }

      main {
        width: min(100%, 52rem);
        padding: clamp(1.5rem, 5vw, 4rem);
        border: 1px solid rgba(172, 194, 225, 0.2);
        border-radius: 1.5rem;
        background: rgba(12, 17, 29, 0.88);
        box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.36);
        backdrop-filter: blur(1rem);
      }

      .status {
        margin: 0 0 1.5rem;
        color: #2ee5ff;
        font: 700 0.75rem/1.4 ui-monospace, "Cascadia Code", monospace;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 11ch;
        margin: 0;
        font-size: clamp(3rem, 10vw, 7rem);
        line-height: 0.94;
        letter-spacing: -0.065em;
      }

      p:not(.status) {
        max-width: 38rem;
        margin: 1.5rem 0 2rem;
        color: #aab7cc;
        font-size: clamp(1rem, 2vw, 1.15rem);
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 3rem;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.15rem;
        border: 1px solid #2ee5ff;
        border-radius: 0.7rem;
        background: #2ee5ff;
        color: #071018;
        font-weight: 800;
        text-decoration: none;
      }

      a:hover {
        background: #8cefff;
      }

      a:focus-visible {
        outline: 3px solid #a887ff;
        outline-offset: 4px;
      }

    </style>
  </head>
  <body>
    <main>
      <p class="status">Error 404 · Signal not found</p>
      <h1>This path goes nowhere.</h1>
      <p>
        The requested page does not exist. Return to the engineering portfolio
        to continue exploring projects, systems and technical work.
      </p>
      <a href="/">Return to portfolio</a>
    </main>
  </body>
</html>
